services:
  lifebot:
    build: .
    container_name: lifebot
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      - MPLCONFIGDIR=/app/.config/matplotlib
    volumes:
      - ./data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
