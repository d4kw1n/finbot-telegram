services:
  finbot:
    build: .
    container_name: finbot
    restart: unless-stopped
    # Use host network — fixes container DNS/connectivity issues
    network_mode: host
    env_file:
      - .env
    volumes:
      # Bind mount — DB file lives on host at ./data/ for easy backup
      - ./data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
